# Standalone compose for running just the bot (expects the API to be reachable).
# For the full stack, use the root docker-compose.yml instead.

name: echoengine-worker
services:
  worker:
    build:
        context: ../..
        dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
