# Standalone compose for running just the bot (expects the API to be reachable).
# For the full stack, use the root docker-compose.yml instead.

name: echoengine-discord-bot

services:
  discord-bot:
    build:
      context: ../..
      dockerfile: apps/discord-bot/Dockerfile
    restart: on-failure:2
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
