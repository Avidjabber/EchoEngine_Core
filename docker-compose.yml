name: echoengine-core

services:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: on-failure:2
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

  # ── Discord Bot ────────────────────────────────────────────────────────────
  discord-bot:
    build:
      context: .
      dockerfile: apps/discord-bot/Dockerfile
    restart: on-failure:2
    env_file:
      - apps/discord-bot/.env
    environment:
      NODE_ENV: production
      API_BASE_URL: http://api:3000
    depends_on:
      - api
